<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Simple</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Instrument+Serif:ital@0;1&display=swap');

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --font-display: 'Instrument Serif', Georgia, serif;
            --font-body: 'DM Sans', sans-serif;
            --color-text: #1a1a2e;
            --color-text-secondary: #475569;
            --color-text-muted: #64748b;
            --color-accent: #6366f1;
            --color-accent-hover: #818cf8;
        }

        body {
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--color-text);
        }

        .video-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .video-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-overlay {
            position: absolute;
            inset: 0;
            background: transparent;
            backdrop-filter: none;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            padding: 24px;
        }

        .card {
            background: rgba(255, 255, 255, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 28px;
            padding: 56px 48px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.15),
                0 0 0 1px rgba(255, 255, 255, 0.5) inset,
                -20px -20px 40px rgba(255, 255, 255, 0.9) inset,
                20px 20px 40px rgba(255, 255, 255, 0.5) inset;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.3), transparent);
        }

        .header {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo {
            display: inline-block;
            font-family: var(--font-display);
            font-style: italic;
            font-size: 36px;
            color: var(--color-text);
            text-decoration: none;
            margin-bottom: 12px;
        }

        .subtitle {
            color: var(--color-text-secondary);
            font-size: 15px;
        }

        .forms-wrapper {
            position: relative;
            min-height: 360px;
        }

        .form-panel {
            position: absolute;
            width: 100%;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .form-panel.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(15px) scale(0.98);
        }

        .form-panel.signup {
            transform: translateX(100%);
            opacity: 0;
            pointer-events: none;
        }

        .form-panel.signup.active {
            transform: translateX(0);
            opacity: 1;
            pointer-events: auto;
        }

        .form-panel.signin {
            transform: translateX(0);
            opacity: 1;
            pointer-events: auto;
        }

        .form-panel.signin.hidden {
            transform: translateX(-100%);
            opacity: 0;
        }

        .form-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 28px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper svg {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: var(--color-text-muted);
            transition: color 0.3s ease;
            pointer-events: none;
        }

        .input-wrapper:focus-within svg {
            color: var(--color-accent);
        }

        .form-input {
            width: 100%;
            padding: 16px 16px 16px 52px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 14px;
            color: var(--color-text);
            font-family: var(--font-body);
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: var(--color-text-muted);
        }

        .form-input:hover {
            background: rgba(255, 255, 255, 0.7);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .form-input:focus {
            background: #ffffff;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .error-message {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 14px 18px;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.15);
            border-radius: 12px;
            color: #dc2626;
            font-size: 14px;
            margin-bottom: 18px;
            animation: shake 0.4s ease;
        }

        .error-message.show {
            display: flex;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        .error-message svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .submit-btn {
            width: 100%;
            padding: 17px;
            background: linear-gradient(135deg, var(--color-accent) 0%, var(--color-accent-hover) 100%);
            border: none;
            border-radius: 14px;
            color: white;
            font-family: var(--font-body);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 26px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,0,0,0.1), transparent);
        }

        .divider span {
            color: var(--color-text-muted);
            font-size: 13px;
            font-weight: 500;
        }

        .google-btn {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 14px;
            color: #1a1a2e;
            font-family: var(--font-body);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .google-btn:hover {
            background: #ffffff;
            transform: translateY(-2px);
        }

        .google-btn svg {
            width: 20px;
            height: 20px;
        }

        .switch-prompt {
            text-align: center;
            margin-top: 28px;
            color: var(--color-text-secondary);
            font-size: 14px;
        }

        .switch-prompt a {
            color: var(--color-accent);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }

        .switch-prompt a:hover {
            text-decoration: underline;
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            backdrop-filter: blur(8px);
        }

        .loading-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .loader-ring {
            width: 60px;
            height: 60px;
            position: relative;
        }

        .loader-ring::before,
        .loader-ring::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 3px solid transparent;
        }

        .loader-ring::before {
            border-top-color: var(--color-accent);
            animation: spin 1s linear infinite;
        }

        .loader-ring::after {
            border-right-color: rgba(99, 102, 241, 0.3);
            border-bottom-color: rgba(99, 102, 241, 0.3);
            animation: spin 1.5s linear infinite reverse;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            color: var(--color-text);
            font-size: 16px;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .card {
                padding: 44px 32px;
                border-radius: 24px;
            }
            .logo {
                font-size: 30px;
            }
            .forms-wrapper {
                min-height: 380px;
            }
        }
    </style>
</head>
<body>
    <div class="video-bg">
        <video id="bgVideo" autoplay muted loop playsinline>
            <source src="https://stream.mux.com/E3rAKyTB54G02a702jKVDAsRnWoRXwUss6mjjctaODp8w.m3u8" type="application/x-mpegURL">
        </video>
        <div class="video-overlay"></div>
    </div>

    <div class="container">
        <div class="card">
            <div class="header">
                <a href="index3.html" class="logo">simple</a>
                <p class="subtitle" id="subtitleText">Welcome back! Please sign in to continue.</p>
            </div>

            <div class="forms-wrapper">
                <form class="form-panel signin active" id="signInPanel">
                    <h2 class="form-title">Sign In</h2>
                    
                    <div class="error-message" id="loginError">
                        <svg viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
                        </svg>
                        <span>Invalid username or password. Please try again.</span>
                    </div>

                    <div class="input-group">
                        <div class="input-wrapper">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                            <input type="text" class="form-input" id="signinUsername" placeholder="Username" autocomplete="username">
                        </div>
                    </div>

                    <div class="input-group">
                        <div class="input-wrapper">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                            <input type="password" class="form-input" id="signinPassword" placeholder="Password" autocomplete="current-password">
                        </div>
                    </div>

                    <button type="submit" class="submit-btn">Sign In</button>

                    <div class="divider">
                        <span>or</span>
                    </div>

                    <button type="button" class="google-btn" id="googleSignIn" onclick="handleGoogleLogin()">
                        <svg viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Continue with Google
                    </button>

                    <p class="switch-prompt">
                        Don't have an account? <a id="showSignUp">Sign up</a>
                    </p>
                </form>

                <form class="form-panel signup" id="signUpPanel">
                    <h2 class="form-title">Create Account</h2>

                    <div class="input-group">
                        <div class="input-wrapper">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                            <input type="text" class="form-input" placeholder="Full name" autocomplete="name">
                        </div>
                    </div>

                    <div class="input-group">
                        <div class="input-wrapper">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                <polyline points="22,6 12,13 2,6"/>
                            </svg>
                            <input type="email" class="form-input" placeholder="Email address" autocomplete="email">
                        </div>
                    </div>

                    <div class="input-group">
                        <div class="input-wrapper">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                            <input type="password" class="form-input" placeholder="Create password" autocomplete="new-password">
                        </div>
                    </div>

                    <button type="submit" class="submit-btn">Create Account</button>

                    <div class="divider">
                        <span>or</span>
                    </div>

                    <button type="button" class="google-btn" id="googleSignUp" onclick="handleGoogleLogin()">
                        <svg viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Sign up with Google
                    </button>

                    <p class="switch-prompt">
                        Already have an account? <a id="showSignIn">Sign in</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader">
            <div class="loader-ring"></div>
            <span class="loader-text">Please wait...</span>
        </div>
    </div>

    <script>
        const signInPanel = document.getElementById('signInPanel');
        const signUpPanel = document.getElementById('signUpPanel');
        const showSignUp = document.getElementById('showSignUp');
        const showSignIn = document.getElementById('showSignIn');
        const subtitleText = document.getElementById('subtitleText');
        const loginError = document.getElementById('loginError');
        const loadingOverlay = document.getElementById('loadingOverlay');

        function toggleForm(toSignUp) {
            if (toSignUp) {
                signInPanel.classList.add('hidden');
                signInPanel.classList.remove('active');
                
                setTimeout(() => {
                    signInPanel.classList.add('signup');
                    signInPanel.classList.remove('signin');
                    
                    signUpPanel.classList.remove('signup');
                    signUpPanel.classList.add('signin', 'active');
                    signUpPanel.classList.remove('hidden');
                    
                    subtitleText.textContent = 'Create your account to get started!';
                }, 100);
            } else {
                signUpPanel.classList.add('hidden');
                signUpPanel.classList.remove('active');
                
                setTimeout(() => {
                    signUpPanel.classList.add('signup');
                    signUpPanel.classList.remove('signin');
                    
                    signInPanel.classList.remove('signup');
                    signInPanel.classList.add('signin', 'active');
                    signInPanel.classList.remove('hidden');
                    
                    subtitleText.textContent = 'Welcome back! Please sign in to continue.';
                }, 100);
            }
        }

        showSignUp.addEventListener('click', () => toggleForm(true));
        showSignIn.addEventListener('click', () => toggleForm(false));

        function showLoading() {
            loadingOverlay.classList.add('show');
        }

        function handleGoogleLogin() {
            if (typeof window.handleGoogleLogin === 'function') {
                window.handleGoogleLogin();
            }
        }

        function redirectToHome() {
            showLoading();
            setTimeout(() => {
                window.location.href = 'index3.html';
            }, 1200);
        }

        async function handleEmailLogin(email, password) {
            if (typeof window.handleEmailSignIn === 'function') {
                showLoading();
                const success = await window.handleEmailSignIn(email, password);
                if (success) {
                    window.location.href = 'index3.html';
                } else {
                    loadingOverlay.classList.remove('show');
                    loginError.classList.add('show');
                    document.getElementById('signinPassword').value = '';
                }
            } else {
                if (email === 'admin' && password === 'admin') {
                    redirectToHome();
                } else {
                    loginError.classList.add('show');
                    document.getElementById('signinPassword').value = '';
                }
            }
        }

        signInPanel.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('signinUsername').value.trim();
            const password = document.getElementById('signinPassword').value;

            loginError.classList.remove('show');
            handleEmailLogin(username, password);
        });

        signUpPanel.addEventListener('submit', function(e) {
            e.preventDefault();
            redirectToHome();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                if (signInPanel.classList.contains('active')) {
                    signInPanel.dispatchEvent(new Event('submit'));
                } else if (signUpPanel.classList.contains('active')) {
                    signUpPanel.dispatchEvent(new Event('submit'));
                }
            }
        });
    </script>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js';
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBMp0yHdnq5jsk7DDIzHt39Zza_yd8m9Lk",
            authDomain: "novus-f4701.firebaseapp.com",
            projectId: "novus-f4701",
            storageBucket: "novus-f4701.firebasestorage.app",
            messagingSenderId: "1034054689984",
            appId: "1:1034054689984:web:75076e404dc4710bd93925",
            measurementId: "G-MQJYPWEWTQ"
        };

        let auth;
        try {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
        } catch (e) {
            console.log('Firebase init error:', e);
        }

        const googleProvider = new GoogleAuthProvider();

        window.handleGoogleLogin = async function() {
            if (!auth) {
                alert('Firebase not initialized. Check console.');
                return;
            }

            showLoading();
            try {
                const result = await signInWithPopup(auth, googleProvider);
                console.log('Logged in:', result.user);
                window.location.href = 'index3.html';
            } catch (error) {
                loadingOverlay.classList.remove('show');
                console.error('Google Sign-In Error:', error);
                if (error.code === 'auth/popup-closed-by-user') {
                    alert('Popup closed. Try again.');
                } else if (error.code === 'auth/unauthorized-domain') {
                    alert('Domain not authorized in Firebase Console.');
                } else {
                    alert('Sign-in failed: ' + error.message);
                }
            }
        };

        window.handleEmailSignIn = async function(email, password) {
            if (!auth) {
                return email === 'admin' && password === 'admin';
            }
            try {
                await signInWithEmailAndPassword(auth, email, password);
                return true;
            } catch (error) {
                console.error('Email Sign-In Error:', error);
                return false;
            }
        };
    </script>
</body>
</html>
